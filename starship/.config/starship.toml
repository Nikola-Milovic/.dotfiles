format = """
$username\
$hostname\
$directory\
$git_branch\
$python\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[➜](bold purple)"
error_symbol = "[➜](bold red)"

[git_branch]
format = 'on [$symbol$branch(:$remote_branch)]($style) '

[python]
format = "via [${symbol}${pyenv_prefix}${version} (${virtualenv})]($style) "
pyenv_version_name = false
pyenv_prefix = "pyenv "
style = "yellow bold"
symbol = "🐍 "
